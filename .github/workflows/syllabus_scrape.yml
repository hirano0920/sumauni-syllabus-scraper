name: Syllabus Scraper

on:
  schedule:
    # 毎週日曜 2:00 JST (土曜 17:00 UTC)
    - cron: '0 17 * * 6'
  workflow_dispatch:
    inputs:
      cms:
        description: 'CMS種別 (livecampus / campusplan / gakuen / tsukuba / custom / all)'
        required: false
        default: 'all'
      university:
        description: '特定大学のみ (例: 早稲田大学)'
        required: false
        default: ''
      dry_run:
        description: 'DRY RUN (Firestoreに書かない)'
        type: boolean
        default: false

env:
  NODE_VERSION: '20'
  SCRAPE_YEAR: '2025'

jobs:
  # ---- KdB (筑波) — APIありなので単独で速い ----
  tsukuba:
    name: 筑波大学 KdB
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: ${{ github.event.inputs.cms == '' || github.event.inputs.cms == 'all' || github.event.inputs.cms == 'tsukuba' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: scraper/package-lock.json
      - name: Install deps
        working-directory: scraper
        run: npm ci
      - name: Run scraper
        working-directory: scraper
        run: node src/index.js --cms=tsukuba
        env:
          FIREBASE_SA_KEY: ${{ secrets.FIREBASE_SA_KEY }}
          SCRAPE_YEAR: ${{ env.SCRAPE_YEAR }}
          DRY_RUN: ${{ github.event.inputs.dry_run == 'true' && '1' || '0' }}

  # ---- LiveCampus グループ (並列で13校同時) ----
  livecampus:
    name: LiveCampus - ${{ matrix.university }}
    runs-on: ubuntu-latest
    timeout-minutes: 120
    if: ${{ github.event.inputs.cms == '' || github.event.inputs.cms == 'all' || github.event.inputs.cms == 'livecampus' }}
    strategy:
      fail-fast: false
      max-parallel: 13
      matrix:
        university:
          - 早稲田大学
          - 立教大学
          - 法政大学
          - 日本大学
          - 東洋大学
          - 専修大学
          - 駒澤大学
          - 中央大学
          - 明治大学
          - 青山学院大学
          - 成蹊大学
          - 武蔵大学
          - 東海大学
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: scraper/package-lock.json
      - name: Install deps
        working-directory: scraper
        run: npm ci
      - name: Run scraper
        working-directory: scraper
        run: node src/index.js --cms=livecampus --university="${{ matrix.university }}"
        env:
          FIREBASE_SA_KEY: ${{ secrets.FIREBASE_SA_KEY }}
          SCRAPE_YEAR: ${{ env.SCRAPE_YEAR }}
          DRY_RUN: ${{ github.event.inputs.dry_run == 'true' && '1' || '0' }}

  # ---- CampusPlan グループ (並列8校) ----
  campusplan:
    name: CampusPlan - ${{ matrix.university }}
    runs-on: ubuntu-latest
    timeout-minutes: 120
    if: ${{ github.event.inputs.cms == '' || github.event.inputs.cms == 'all' || github.event.inputs.cms == 'campusplan' }}
    strategy:
      fail-fast: false
      max-parallel: 8
      matrix:
        university:
          - 立命館大学
          - 関西大学
          - 関西学院大学
          - 同志社大学
          - 近畿大学
          - 龍谷大学
          - 甲南大学
          - 京都産業大学
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: scraper/package-lock.json
      - name: Install deps
        working-directory: scraper
        run: npm ci
      - name: Run scraper
        working-directory: scraper
        run: node src/index.js --cms=campusplan --university="${{ matrix.university }}"
        env:
          FIREBASE_SA_KEY: ${{ secrets.FIREBASE_SA_KEY }}
          SCRAPE_YEAR: ${{ env.SCRAPE_YEAR }}
          DRY_RUN: ${{ github.event.inputs.dry_run == 'true' && '1' || '0' }}

  # ---- 学園シリーズ (並列5校) ----
  gakuen:
    name: 学園シリーズ - ${{ matrix.university }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    if: ${{ github.event.inputs.cms == '' || github.event.inputs.cms == 'all' || github.event.inputs.cms == 'gakuen' }}
    strategy:
      fail-fast: false
      max-parallel: 5
      matrix:
        university:
          - 成城大学
          - 明治学院大学
          - 獨協大学
          - 國學院大學
          - 武蔵野大学
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: scraper/package-lock.json
      - name: Install deps
        working-directory: scraper
        run: npm ci
      - name: Run scraper
        working-directory: scraper
        run: node src/index.js --cms=gakuen --university="${{ matrix.university }}"
        env:
          FIREBASE_SA_KEY: ${{ secrets.FIREBASE_SA_KEY }}
          SCRAPE_YEAR: ${{ env.SCRAPE_YEAR }}
          DRY_RUN: ${{ github.event.inputs.dry_run == 'true' && '1' || '0' }}

  # ---- カスタム (独自システム) ----
  custom:
    name: カスタム - ${{ matrix.university }}
    runs-on: ubuntu-latest
    timeout-minutes: 180
    if: ${{ github.event.inputs.cms == '' || github.event.inputs.cms == 'all' || github.event.inputs.cms == 'custom' }}
    strategy:
      fail-fast: false
      max-parallel: 8
      matrix:
        university:
          - 東京大学
          - 京都大学
          - 慶應義塾大学
          - 上智大学
          - 東京理科大学
          - 国際基督教大学
          - 一橋大学
          - 東京科学大学
          - 北海道大学
          - 東北大学
          - 名古屋大学
          - 大阪大学
          - 九州大学
          - 神戸大学
          - 学習院大学
          - 筑波大学
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: scraper/package-lock.json
      - name: Install deps
        working-directory: scraper
        run: npm ci
      - name: Run scraper
        working-directory: scraper
        run: node src/index.js --cms=custom --university="${{ matrix.university }}"
        env:
          FIREBASE_SA_KEY: ${{ secrets.FIREBASE_SA_KEY }}
          SCRAPE_YEAR: ${{ env.SCRAPE_YEAR }}
          DRY_RUN: ${{ github.event.inputs.dry_run == 'true' && '1' || '0' }}

  # ---- 完了通知 ----
  notify:
    name: 完了サマリー
    runs-on: ubuntu-latest
    needs: [tsukuba, livecampus, campusplan, gakuen, custom]
    if: always()
    steps:
      - name: Summary
        run: |
          echo "## シラバス スクレイピング完了" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| 筑波大学 KdB | ${{ needs.tsukuba.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| LiveCampus (13校) | ${{ needs.livecampus.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| CampusPlan (8校) | ${{ needs.campusplan.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 学園シリーズ (5校) | ${{ needs.gakuen.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| カスタム (16校) | ${{ needs.custom.result }} |" >> $GITHUB_STEP_SUMMARY
