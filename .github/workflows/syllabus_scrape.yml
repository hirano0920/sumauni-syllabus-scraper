name: Syllabus Scraper

on:
  schedule:
    - cron: '0 17 * * 6'  # 毎週日曜 2:00 JST
  workflow_dispatch:
    inputs:
      cms:
        description: 'CMS種別 (livecampus / campusplan / gakuen / custom / all)'
        required: false
        default: 'all'
      university:
        description: '特定大学のみ (例: 早稲田大学)'
        required: false
        default: ''
      dry_run:
        description: 'DRY RUN (Firestoreに書かない)'
        type: boolean
        default: false

env:
  NODE_VERSION: '20'
  SCRAPE_YEAR: '2025'

jobs:
  # ---- LiveCampus (22校 並列) ----
  livecampus:
    name: LiveCampus - ${{ matrix.university }}
    runs-on: ubuntu-latest
    timeout-minutes: 120
    if: ${{ github.event.inputs.cms == '' || github.event.inputs.cms == 'all' || github.event.inputs.cms == 'livecampus' }}
    strategy:
      fail-fast: false
      max-parallel: 22
      matrix:
        university:
          - 早稲田大学
          - 立教大学
          - 法政大学
          - 日本大学
          - 東洋大学
          - 専修大学
          - 駒澤大学
          - 中央大学
          - 明治大学
          - 青山学院大学
          - 成蹊大学
          - 武蔵大学
          - 東海大学
          - 芝浦工業大学
          - 工学院大学
          - 東京電機大学
          - 東京都市大学
          - 神奈川大学
          - 東北学院大学
          - 大東文化大学
          - 東京農業大学
          - 帝京大学
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci
      - run: node src/index.js --cms=livecampus --university="${{ matrix.university }}"
        env:
          FIREBASE_SA_KEY: ${{ secrets.FIREBASE_SA_KEY }}
          SCRAPE_YEAR: ${{ env.SCRAPE_YEAR }}
          DRY_RUN: ${{ github.event.inputs.dry_run == 'true' && '1' || '0' }}

  # ---- CampusPlan (11校 並列) ----
  campusplan:
    name: CampusPlan - ${{ matrix.university }}
    runs-on: ubuntu-latest
    timeout-minutes: 120
    if: ${{ github.event.inputs.cms == '' || github.event.inputs.cms == 'all' || github.event.inputs.cms == 'campusplan' }}
    strategy:
      fail-fast: false
      max-parallel: 11
      matrix:
        university:
          - 立命館大学
          - 関西大学
          - 関西学院大学
          - 同志社大学
          - 近畿大学
          - 龍谷大学
          - 甲南大学
          - 京都産業大学
          - 大阪経済大学
          - 大阪工業大学
          - 佛教大学
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci
      - run: node src/index.js --cms=campusplan --university="${{ matrix.university }}"
        env:
          FIREBASE_SA_KEY: ${{ secrets.FIREBASE_SA_KEY }}
          SCRAPE_YEAR: ${{ env.SCRAPE_YEAR }}
          DRY_RUN: ${{ github.event.inputs.dry_run == 'true' && '1' || '0' }}

  # ---- 学園シリーズ (5校 並列) ----
  gakuen:
    name: 学園シリーズ - ${{ matrix.university }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    if: ${{ github.event.inputs.cms == '' || github.event.inputs.cms == 'all' || github.event.inputs.cms == 'gakuen' }}
    strategy:
      fail-fast: false
      max-parallel: 5
      matrix:
        university:
          - 成城大学
          - 明治学院大学
          - 獨協大学
          - 國學院大學
          - 武蔵野大学
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci
      - run: node src/index.js --cms=gakuen --university="${{ matrix.university }}"
        env:
          FIREBASE_SA_KEY: ${{ secrets.FIREBASE_SA_KEY }}
          SCRAPE_YEAR: ${{ env.SCRAPE_YEAR }}
          DRY_RUN: ${{ github.event.inputs.dry_run == 'true' && '1' || '0' }}

  # ---- カスタム (79校 を2バッチに分割、各20並列) ----
  custom-a:
    name: カスタムA - ${{ matrix.university }}
    runs-on: ubuntu-latest
    timeout-minutes: 180
    if: ${{ github.event.inputs.cms == '' || github.event.inputs.cms == 'all' || github.event.inputs.cms == 'custom' }}
    strategy:
      fail-fast: false
      max-parallel: 20
      matrix:
        university:
          # 旧帝・難関国立・早慶上理
          - 東京大学
          - 一橋大学
          - 東京科学大学
          - 北海道大学
          - 東北大学
          - 名古屋大学
          - 京都大学
          - 大阪大学
          - 九州大学
          - 筑波大学
          - お茶の水女子大学
          - 千葉大学
          - 横浜国立大学
          - 神戸大学
          - 慶應義塾大学
          - 上智大学
          - 東京理科大学
          - 国際基督教大学
          - 学習院大学
          # 電農名織・特殊国立
          - 電気通信大学
          - 東京農工大学
          - 名古屋工業大学
          - 豊橋技術科学大学
          - 東京外国語大学
          - 東京学芸大学
          - 京都工芸繊維大学
          - 九州工業大学
          # 金岡千広
          - 金沢大学
          - 岡山大学
          - 広島大学
          # 5S
          - 埼玉大学
          - 信州大学
          - 静岡大学
          - 滋賀大学
          - 新潟大学
          # 東北地方国立
          - 弘前大学
          - 岩手大学
          - 秋田大学
          - 山形大学
          - 福島大学
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci
      - run: node src/index.js --cms=custom --university="${{ matrix.university }}"
        env:
          FIREBASE_SA_KEY: ${{ secrets.FIREBASE_SA_KEY }}
          SCRAPE_YEAR: ${{ env.SCRAPE_YEAR }}
          DRY_RUN: ${{ github.event.inputs.dry_run == 'true' && '1' || '0' }}

  custom-b:
    name: カスタムB - ${{ matrix.university }}
    runs-on: ubuntu-latest
    timeout-minutes: 180
    if: ${{ github.event.inputs.cms == '' || github.event.inputs.cms == 'all' || github.event.inputs.cms == 'custom' }}
    strategy:
      fail-fast: false
      max-parallel: 20
      matrix:
        university:
          # 関東・甲信越国立
          - 茨城大学
          - 宇都宮大学
          - 群馬大学
          - 富山大学
          - 福井大学
          - 山梨大学
          # 東海・近畿国立
          - 岐阜大学
          - 三重大学
          - 和歌山大学
          # 中国・四国国立
          - 鳥取大学
          - 島根大学
          - 山口大学
          - 徳島大学
          - 香川大学
          - 愛媛大学
          - 高知大学
          # 九州・沖縄国立
          - 佐賀大学
          - 長崎大学
          - 熊本大学
          - 大分大学
          - 宮崎大学
          - 鹿児島大学
          - 琉球大学
          # 主要公立
          - 東京都立大学
          - 大阪公立大学
          - 横浜市立大学
          - 名古屋市立大学
          - 京都府立大学
          - 兵庫県立大学
          - 静岡県立大学
          - 愛知県立大学
          - 北九州市立大学
          # 名古屋圏私立
          - 中京大学
          - 名城大学
          - 南山大学
          - 愛知大学
          # 九州私立
          - 西南学院大学
          - 福岡大学
          # 北海道私立
          - 北海学園大学
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci
      - run: node src/index.js --cms=custom --university="${{ matrix.university }}"
        env:
          FIREBASE_SA_KEY: ${{ secrets.FIREBASE_SA_KEY }}
          SCRAPE_YEAR: ${{ env.SCRAPE_YEAR }}
          DRY_RUN: ${{ github.event.inputs.dry_run == 'true' && '1' || '0' }}

  # ---- 完了サマリー ----
  notify:
    name: 完了サマリー (117校)
    runs-on: ubuntu-latest
    needs: [livecampus, campusplan, gakuen, custom-a, custom-b]
    if: always()
    steps:
      - name: Summary
        run: |
          echo "## シラバス スクレイピング完了 (117校)" >> $GITHUB_STEP_SUMMARY
          echo "| グループ | 校数 | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| LiveCampus | 22校 | ${{ needs.livecampus.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| CampusPlan | 11校 | ${{ needs.campusplan.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 学園シリーズ | 5校 | ${{ needs.gakuen.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| カスタムA (旧帝・難関・電農名織・5S等) | 40校 | ${{ needs.custom-a.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| カスタムB (地方国立・公立・名古屋/九州私立等) | 39校 | ${{ needs.custom-b.result }} |" >> $GITHUB_STEP_SUMMARY
